<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ankirai review</title>
  <link rel="stylesheet" href="https://unpkg.com/@picocss/pico@2.1.1/css/pico.min.css">
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(', '\\)']], displayMath: [['\\[', '\\]']] }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@4.1.2/tex-mml-chtml.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.9/dist/htmx.min.js"></script>
  <script src="/static/app.js" defer></script>
  <script>
    (function () {
      const saved = localStorage.getItem('theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    })();
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const system = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      const next = (current || system) === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.getElementById('theme-toggle').textContent = next === 'dark' ? '☀' : '☾';
    }
    document.addEventListener('DOMContentLoaded', () => {
      const saved = localStorage.getItem('theme');
      const system = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.getElementById('theme-toggle').textContent = (saved || system) === 'dark' ? '☀' : '☾';
    });
  </script>
  <style>
    nav { display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    nav .nav-actions { display: flex; align-items: center; gap: .5rem; }
    nav .nav-actions form { margin: 0; }
    nav .nav-actions button { margin-bottom: 0; }
    .progress-bar-wrap { flex: 1; background: var(--pico-muted-border-color); border-radius: 4px; height: 8px; }
    .progress-bar-fill { height: 8px; border-radius: 4px; background: var(--pico-primary); transition: width .3s; }
    .status-badge { font-size: .75rem; padding: .15rem .5rem; border-radius: 999px; }
    .badge-accepted { background: #d1fae5; color: #065f46; }
    .badge-rejected { background: #fee2e2; color: #991b1b; }
    .badge-pending  { background: #e5e7eb; color: #374151; }
    .card-front { font-size: 1.15rem; }
    mark { background: #fef08a; color: #1c1917; border-radius: 3px; padding: 0 2px; }
    @media (prefers-color-scheme: dark) {
      mark { background: #92400e; color: #fef3c7; }
    }
    textarea { font-family: inherit; }
    kbd { font-size: .7em; opacity: .6; border: 1px solid currentColor; border-radius: 3px; padding: 0 3px; font-family: monospace; margin-left: 3px; }
  </style>
</head>
<body>
  <main class="container">
    <nav>
      <strong>ankirai review</strong>
      <div class="progress-bar-wrap" title="{{ accepted }}/{{ total }} accepted">
        <div class="progress-bar-fill" style="width: {{ (accepted / total * 100) | int if total else 0 }}%"></div>
      </div>
      <small>{{ accepted }}/{{ total }} accepted</small>
      <div class="nav-actions">
        <button id="theme-toggle" class="secondary outline" onclick="toggleTheme()" style="width:auto; margin-bottom:0" title="Toggle dark/light mode">☀</button>
        {% if is_bulk %}
        <a href="/review/0" role="button" class="secondary outline">Card view</a>
        {% else %}
        <a href="/bulk" role="button" class="secondary outline">Bulk view</a>
        {% endif %}
        <form action="/export" method="post">
          <button type="submit" class="contrast" data-pending="{{ pending }}">Export</button>
        </form>
      </div>
    </nav>
    <hr>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
